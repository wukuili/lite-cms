<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - LiteCMS Admin</title>
    <link rel="stylesheet" href="/static/admin/css/admin.css">
    <style>
        .role-badge { 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 600; 
        }
        .role-admin { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        .role-editor { background: #eff6ff; color: #3b82f6; border: 1px solid #dbeafe; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>LiteCMS Admin</h2>
            </div>
            <nav>
                <a href="/admin/">仪表盘</a>
                <a href="/admin/articles">文章管理</a>
                <a href="/admin/categories">分类管理</a>
                <a href="/admin/tags">标签管理</a>
                <a href="/admin/media">媒体库</a>
                <a href="/admin/menus">菜单管理</a>
                <a href="/admin/users" class="active">用户管理</a>
                <a href="/admin/settings">系统设置</a>
                <a href="#" onclick="logout()" style="margin-top: auto;">退出登录</a>
            </nav>
        </aside>
        
        <main class="main">
            <header class="header">
                <div>
                    <h2>用户管理</h2>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">管理系统管理员与编辑人员权限</p>
                </div>
                <button class="btn btn-primary" onclick="showCreateModal()">+ 添加新用户</button>
            </header>

            <div class="card" style="padding: 0;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>用户名</th>
                                <th>昵称</th>
                                <th>邮箱</th>
                                <th>角色</th>
                                <th style="text-align: right;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="user-list"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="user-modal" class="modal">
        <div class="modal-content" style="width: 500px;">
            <h3 id="modal-title" style="margin-bottom: 24px; font-weight: 700;">添加用户</h3>
            <form id="user-form" onsubmit="saveUser(event)">
                <input type="hidden" id="user-id">
                <div class="form-group" id="username-group">
                    <label>用户名</label>
                    <input type="text" id="username" required placeholder="登录使用的用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="编辑时不填则不修改密码">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="nickname" placeholder="显示的名称">
                </div>
                <div class="form-group">
                    <label>电子邮箱</label>
                    <input type="email" id="email" placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label>角色权限</label>
                    <select id="role">
                        <option value="editor">编辑 (Editor)</option>
                        <option value="admin">管理员 (Admin)</option>
                    </select>
                </div>
                <div class="form-actions" style="justify-content: flex-end; border-top: 1px solid #f1f5f9; padding-top: 24px;">
                    <button type="button" class="btn" style="background: #f1f5f9; color: #475569;" onclick="hideModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存用户信息</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/admin/login';
        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

        let allUsers = [];

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users', { headers });
                if (!res.ok) throw new Error('Failed to load users');
                allUsers = await res.json();
                renderUserList();
            } catch (err) {
                console.error(err);
                alert('加载用户列表失败');
            }
        }

        function renderUserList() {
            const tbody = document.getElementById('user-list');
            tbody.innerHTML = allUsers.map((user, index) => `
                <tr>
                    <td style="color: var(--text-muted); font-family: monospace;">#${user.id}</td>
                    <td style="font-weight: 600;">${user.username}</td>
                    <td>${user.nickname || '-'}</td>
                    <td style="color: var(--text-muted);">${user.email || '-'}</td>
                    <td><span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-editor'}">${user.role.toUpperCase()}</span></td>
                    <td style="text-align: right;">
                        <button class="btn btn-sm" style="color: var(--primary);" onclick="editUserByIndex(${index})">编辑</button>
                        <button class="btn btn-sm" style="color: #ef4444;" onclick="deleteUser(${user.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function showCreateModal() {
            document.getElementById('modal-title').textContent = '添加用户';
            document.getElementById('user-id').value = '';
            document.getElementById('username').value = '';
            document.getElementById('username').disabled = false;
            document.getElementById('password').required = true;
            document.getElementById('nickname').value = '';
            document.getElementById('email').value = '';
            document.getElementById('role').value = 'editor';
            document.getElementById('user-modal').classList.add('show');
        }

        function hideModal() {
            document.getElementById('user-modal').classList.remove('show');
        }

        function editUserByIndex(index) {
            const user = allUsers[index];
            document.getElementById('modal-title').textContent = '编辑用户';
            document.getElementById('user-id').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('username').disabled = true;
            document.getElementById('password').required = false;
            document.getElementById('password').value = '';
            document.getElementById('nickname').value = user.nickname || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('role').value = user.role;
            document.getElementById('user-modal').classList.add('show');
        }

        async function saveUser(e) {
            e.preventDefault();
            const id = document.getElementById('user-id').value;
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                nickname: document.getElementById('nickname').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/admin/users/${id}` : '/api/admin/users';

            try {
                const res = await fetch(url, { method, headers, body: JSON.stringify(data) });
                if (res.ok) { hideModal(); loadUsers(); } else {
                    const err = await res.json();
                    alert(err.error || '操作失败');
                }
            } catch (err) { alert('网络错误'); }
        }

        async function deleteUser(id) {
            if (!confirm('确定删除吗？')) return;
            try {
                const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers });
                if (res.ok) loadUsers();
            } catch (err) { alert('删除失败'); }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/admin/login'; }
        loadUsers();
    </script>
</body>
</html>
