<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - LiteCMS Admin</title>
    <link rel="stylesheet" href="/static/admin/css/admin.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 32px;
        }
        .form-group { text-align: left; }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-top: 8px;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.8125rem;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-logo">LiteCMS</h1>
        <p class="login-subtitle">请登录您的管理账户以继续</p>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required placeholder="admin" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-login">进入后台</button>
            <p id="error-msg" class="error-msg">用户名或密码错误</p>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/admin/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.token);
                    window.location.href = '/admin/';
                } else {
                    const err = await res.json();
                    errorMsg.textContent = err.error || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = '网络连接失败';
                errorMsg.style.display = 'block';
            }
        }

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/admin/';
        }
    </script>
</body>
</html>
