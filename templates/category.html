{{ define "content" }}
<div class="page-header">
    <p>分类</p>
    <h1>{{ .category.Name }}</h1>
</div>

<div class="article-grid">
    {{ if not .articles }}
    <div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-muted);">
        该分类下暂无文章。
    </div>
    {{ end }}
    {{ range .articles }}
        <a href="/posts/{{ .Slug }}" class="article-card">
            <div class="meta">{{ if .PublishedAt }}{{ .PublishedAt.Format "2006-01-02" }}{{ else }}未发布{{ end }}</div>
            <h3>{{ .Title }}</h3>
            <p>{{ .Summary }}</p>
            <div class="read-more-link">阅读全文 <span>&rarr;</span></div>
        </a>
    {{ end }}
</div>

{{ if .has_more }}
<div class="pagination">
    <a href="/category/{{ .category.Slug }}?cursor={{ .next }}">浏览更多文章</a>
</div>
{{ end }}
{{ end }}
